<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <div class="card">
      <div class="main">
        <p class="location">Leningrad, Soviet Union</p>
        <img
          src="./assets/images/Victor_Tsoi_photo.jpg"
          alt="Victor-Tsoi-photo"
          class="photo"
        />
        <h1 class="full-name">Victor Tsoi</h1>
        <p class="description">
          A Soviet singer-songwriter and actor who co-founded Kino, one of the
          most popular and influential bands in the history of Russian music.
        </p>
        <button class="follow-btn">Follow</button>
      </div>
      <div class="footer">
        <section class="footer-section">
          <p>🖼</p>
          <span class="footer-section-text">
            <span>Posts</span>
            <span>635</span>
          </span>
        </section>
        <section class="footer-section">
          <p>❤️</p>
          <span class="footer-section-text">
            <span>Favorites</span>
            <span>3,472</span>
          </span>
        </section>
        <section class="footer-section">
          <p>✈️</p>
          <span class="footer-section-text">
            <span>Messages</span>
            <span>1,293</span>
          </span>
        </section>
      </div>
    </div>
  </body>
</html>
