<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card</title>
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <div class="card">
      <div class="main">
        <p class="location">Leningrad, Soviet Union</p>
        <img
          src="./assets/images/Victor_Tsoi_photo.jpg"
          alt="Victor-Tsoi-photo"
          class="photo"
        />
        <h1 class="full-name">Victor Tsoi</h1>
        <p class="description">
          A Soviet singer-songwriter and actor who co-founded Kino, one of the
          most popular and influential bands in the history of Russian music.
        </p>
        <button>Follow</button>
      </div>
      <div class="footer">
        <a href="#">
          <p>🖼</p>
          <div class="footer-btn-text">
            <p>Posts</p>
            <p>635</p>
          </div>
        </a>
        <a href="#">
          <p>❤️</p>
          <div class="footer-btn-text">
            <p>Favorites</p>
            <p>3,472</p>
          </div>
        </a>
        <a href="#">
          <p>✈️</p>
          <div class="footer-btn-text">
            <p>Messages</p>
            <p>1,293</p>
          </div>
        </a>
      </div>
    </div>
  </body>
</html>
